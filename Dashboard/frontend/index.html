<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Server Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #06080e;
            --bg-secondary: #0a0e1a;
            --bg-card: rgba(12, 18, 30, 0.65);
            --neon-blue: #00d4ff;
            --neon-blue-dim: rgba(0, 212, 255, 0.15);
            --neon-green: #00ff88;
            --neon-green-dim: rgba(0, 255, 136, 0.15);
            --neon-red: #ff3366;
            --neon-red-dim: rgba(255, 51, 102, 0.15);
            --neon-purple: #a855f7;
            --neon-purple-dim: rgba(168, 85, 247, 0.15);
            --neon-orange: #ff8c00;
            --neon-orange-dim: rgba(255, 140, 0, 0.15);
            --neon-cyan: #22d3ee;
            --neon-cyan-dim: rgba(34, 211, 238, 0.15);
            --neon-yellow: #fbbf24;
            --neon-yellow-dim: rgba(251, 191, 36, 0.15);
            --text-primary: #f0f4ff;
            --text-secondary: #8892a4;
            --text-muted: #4a5568;
            --glass-bg: rgba(15, 23, 42, 0.5);
            --glass-border: rgba(148, 163, 184, 0.08);
            --glass-border-hover: rgba(0, 212, 255, 0.25);
            --glass-blur: blur(24px);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ── Animated Background ── */
        .bg-effects {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-effects::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse 600px 600px at 20% 20%, rgba(0, 212, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 500px 500px at 80% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse 400px 400px at 50% 50%, rgba(168, 85, 247, 0.04) 0%, transparent 60%);
            animation: bgDrift 30s ease-in-out infinite alternate;
        }

        @keyframes bgDrift {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -3%) rotate(1deg); }
            66% { transform: translate(-2%, 2%) rotate(-1deg); }
            100% { transform: translate(1%, -1deg); }
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(148, 163, 184, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 70%);
        }

        /* ── Particles ── */
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: var(--neon-blue);
            opacity: 0;
            animation: particleFloat linear infinite;
            box-shadow: 0 0 6px var(--neon-blue);
        }

        @keyframes particleFloat {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.6; }
            90% { opacity: 0.1; }
            100% { opacity: 0; transform: translateY(-20vh) scale(1); }
        }

        /* ── Layout ── */
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            padding: 1.25rem 2rem;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-glow {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow:
                0 0 20px rgba(0, 212, 255, 0.3),
                0 0 40px rgba(0, 212, 255, 0.1);
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), 0 0 40px rgba(0, 212, 255, 0.1); }
            50% { box-shadow: 0 0 30px rgba(0, 212, 255, 0.5), 0 0 60px rgba(0, 212, 255, 0.2); }
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, var(--neon-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 2px;
        }

        .global-actions {
            display: flex;
            gap: 0.75rem;
        }

        /* ── Neon Buttons ── */
        button {
            font-family: 'Inter', sans-serif;
            font-size: 0.8125rem;
            font-weight: 600;
            padding: 0.625rem 1.25rem;
            border-radius: var(--radius-md);
            border: 1px solid;
            cursor: pointer;
            transition: all var(--transition);
            outline: none;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        button::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            opacity: 0;
            transition: opacity var(--transition);
        }

        button:hover::before { opacity: 1; }

        .btn-primary {
            background: var(--neon-blue-dim);
            color: var(--neon-blue);
            border-color: rgba(0, 212, 255, 0.25);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.08);
        }

        .btn-primary:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: var(--neon-blue);
            box-shadow:
                0 0 16px rgba(0, 212, 255, 0.2),
                0 0 32px rgba(0, 212, 255, 0.08);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--neon-red-dim);
            color: var(--neon-red);
            border-color: rgba(255, 51, 102, 0.25);
            box-shadow: 0 0 12px rgba(255, 51, 102, 0.08);
        }

        .btn-danger:hover {
            background: rgba(255, 51, 102, 0.2);
            border-color: var(--neon-red);
            box-shadow:
                0 0 16px rgba(255, 51, 102, 0.2),
                0 0 32px rgba(255, 51, 102, 0.08);
            transform: translateY(-1px);
        }

        .btn-accent {
            background: var(--neon-green-dim);
            color: var(--neon-green);
            border-color: rgba(0, 255, 136, 0.25);
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.08);
        }

        .btn-accent:hover {
            background: rgba(0, 255, 136, 0.2);
            border-color: var(--neon-green);
            box-shadow:
                0 0 16px rgba(0, 255, 136, 0.2),
                0 0 32px rgba(0, 255, 136, 0.08);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            border-color: var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.6875rem;
            border-radius: var(--radius-sm);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Button click ripple */
        button:active { transform: scale(0.97); }

        /* ── Button Spinner ── */
        .btn-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Server Grid ── */
        .server-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(440px, 1fr));
            gap: 1.5rem;
        }

        .server-grid.compact {
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 1.25rem;
        }

        /* ── Glass Card ── */
        .card {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
            opacity: 0;
            transition: opacity var(--transition);
        }

        .card:hover {
            border-color: var(--glass-border-hover);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(0, 212, 255, 0.05),
                0 0 40px rgba(0, 212, 255, 0.05);
            transform: translateY(-2px);
        }

        .card:hover::before { opacity: 0.5; }

        .card-running { border-top: 2px solid var(--neon-green); }
        .card-stopped { border-top: 2px solid var(--neon-red); }

        /* ── Card Header ── */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .server-name {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .server-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .icon-router { background: var(--neon-blue-dim); border: 1px solid rgba(0, 212, 255, 0.2); }
        .icon-qwen { background: var(--neon-green-dim); border: 1px solid rgba(0, 255, 136, 0.2); }
        .icon-deepseek { background: var(--neon-purple-dim); border: 1px solid rgba(168, 85, 247, 0.2); }
        .icon-kimi { background: var(--neon-orange-dim); border: 1px solid rgba(255, 140, 0, 0.2); }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            font-size: 0.6875rem;
            font-weight: 700;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-running {
            background: rgba(0, 255, 136, 0.08);
            border: 1px solid rgba(0, 255, 136, 0.2);
            color: var(--neon-green);
        }

        .status-running .status-dot {
            background: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green), 0 0 16px rgba(0, 255, 136, 0.3);
            animation: dotPulse 2s ease-in-out infinite;
        }

        .status-stopped {
            background: rgba(255, 51, 102, 0.08);
            border: 1px solid rgba(255, 51, 102, 0.2);
            color: var(--neon-red);
        }

        .status-stopped .status-dot {
            background: var(--neon-red);
            box-shadow: 0 0 6px rgba(255, 51, 102, 0.4);
        }

        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 8px var(--neon-green), 0 0 16px rgba(0, 255, 136, 0.3); }
            50% { box-shadow: 0 0 12px var(--neon-green), 0 0 24px rgba(0, 255, 136, 0.5); }
        }

        /* ── Card Info ── */
        .card-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.625rem;
            font-size: 0.8125rem;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 0.125rem;
            padding: 0.375rem 0.625rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .info-label {
            color: var(--text-muted);
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .info-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
            color: var(--text-primary);
        }

        .api-status-ok { color: var(--neon-green); }
        .api-status-offline { color: var(--text-muted); }
        .api-status-timeout { color: var(--neon-yellow); }
        .api-status-error { color: var(--neon-red); }

        /* ── Card Actions ── */
        .card-actions {
            display: flex;
            gap: 0.5rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--glass-border);
            flex-wrap: wrap;
        }

        /* ── Tokens Section ── */
        .tokens-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            padding: 0.875rem;
            background: rgba(0, 0, 0, 0.25);
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        .tokens-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.15), transparent);
        }

        .token-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .token-label {
            font-size: 0.5625rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .token-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .token-input { color: var(--neon-cyan); text-shadow: 0 0 12px rgba(34, 211, 238, 0.3); }
        .token-output { color: var(--neon-green); text-shadow: 0 0 12px rgba(0, 255, 136, 0.3); }
        .token-total { color: var(--text-primary); text-shadow: 0 0 12px rgba(255, 255, 255, 0.15); }
        .token-requests { color: var(--neon-purple); text-shadow: 0 0 12px rgba(168, 85, 247, 0.3); }

        /* ── Details Section ── */
        .details-section {
            display: none;
            flex-direction: column;
            gap: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--glass-border);
        }

        .details-section.expanded {
            display: flex;
        }

        .details-header {
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--neon-blue);
            margin-bottom: 0.25rem;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
        }

        .model-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .model-item {
            padding: 0.625rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
            font-size: 0.75rem;
            transition: all var(--transition);
        }

        .model-item:hover {
            border-color: rgba(0, 212, 255, 0.15);
            background: rgba(0, 212, 255, 0.03);
        }

        .model-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .model-meta {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            font-size: 0.6875rem;
            color: var(--text-secondary);
        }

        .model-tag {
            padding: 0.125rem 0.5rem;
            background: var(--neon-blue-dim);
            border-radius: 4px;
            color: var(--neon-blue);
            font-weight: 500;
        }

        .account-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
        }

        .account-badge {
            padding: 0.25rem 0.625rem;
            background: var(--neon-green-dim);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: var(--radius-sm);
            font-size: 0.6875rem;
            color: var(--neon-green);
            font-family: 'JetBrains Mono', monospace;
            transition: all var(--transition);
        }

        .account-badge:hover {
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.15);
        }

        /* ── Router Fallback Chain ── */
        .router-model-card {
            padding: 0.75rem;
            background: rgba(0, 212, 255, 0.03);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: var(--radius-md);
            margin-bottom: 0.5rem;
            transition: all var(--transition);
        }

        .router-model-card:hover {
            border-color: rgba(0, 212, 255, 0.2);
            background: rgba(0, 212, 255, 0.05);
        }

        .router-model-name {
            font-weight: 700;
            color: var(--neon-blue);
            font-size: 0.8125rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
        }

        .fallback-chain {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            padding-left: 0.75rem;
            border-left: 2px solid rgba(0, 212, 255, 0.15);
        }

        .fallback-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.6875rem;
            color: var(--text-secondary);
        }

        .fallback-priority {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.625rem;
            color: var(--neon-cyan);
            min-width: 1.5rem;
            text-shadow: 0 0 6px rgba(34, 211, 238, 0.3);
        }

        .fallback-provider {
            color: var(--text-primary);
            font-weight: 500;
        }

        .fallback-model {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-secondary);
            font-size: 0.625rem;
        }

        /* ── Active Models ── */
        .active-models-section {
            padding: 0.75rem;
            background: rgba(0, 255, 136, 0.04);
            border: 1px solid rgba(0, 255, 136, 0.12);
            border-radius: var(--radius-md);
        }

        .active-models-label {
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--neon-green);
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 8px rgba(0, 255, 136, 0.3);
        }

        .active-models-list {
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
        }

        .active-model-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
        }

        .active-model-vm {
            font-weight: 700;
            color: var(--text-primary);
            min-width: 5rem;
        }

        .active-model-arrow {
            color: var(--neon-green);
            font-weight: 700;
            text-shadow: 0 0 6px rgba(0, 255, 136, 0.3);
        }

        .active-model-name {
            font-family: 'JetBrains Mono', monospace;
            color: var(--neon-green);
            font-weight: 500;
            word-break: break-all;
            text-shadow: 0 0 8px rgba(0, 255, 136, 0.2);
        }

        /* ── Logs ── */
        .logs-container {
            margin-top: 0.5rem;
        }

        .logs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .logs-actions {
            display: flex;
            gap: 0.375rem;
            align-items: center;
        }

        .logs-last-update {
            font-size: 0.625rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .logs-viewer {
            background: #060a12;
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 0.875rem;
            max-height: 320px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            line-height: 1.7;
            color: var(--text-secondary);
            position: relative;
        }

        .logs-viewer::-webkit-scrollbar { width: 4px; }
        .logs-viewer::-webkit-scrollbar-track { background: transparent; }
        .logs-viewer::-webkit-scrollbar-thumb { background: rgba(0, 212, 255, 0.15); border-radius: 2px; }

        .log-line-stdout { color: var(--neon-green); }
        .log-line-stderr { color: var(--neon-red); }
        .log-line-warn { color: var(--neon-yellow); }

        .logs-loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            border-radius: var(--radius-md);
            z-index: 2;
        }

        .logs-loading.hidden { display: none; }

        .mini-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(0, 212, 255, 0.15);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.15);
        }

        /* ── Toast ── */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            pointer-events: none;
        }

        .toast {
            background: rgba(10, 14, 26, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid;
            border-radius: var(--radius-lg);
            padding: 0.875rem 1.5rem;
            font-size: 0.8125rem;
            color: var(--text-primary);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: toastIn 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            pointer-events: auto;
            max-width: 380px;
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        .toast.toast-success { border-color: rgba(0, 255, 136, 0.3); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 255, 136, 0.08); }
        .toast.toast-error { border-color: rgba(255, 51, 102, 0.3); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 51, 102, 0.08); }
        .toast.toast-info { border-color: rgba(0, 212, 255, 0.3); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 212, 255, 0.08); }

        .toast-icon { font-size: 1rem; flex-shrink: 0; }
        .toast.toast-out { animation: toastOut 0.3s ease forwards; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(-10px) scale(0.95); }
        }

        /* ── Loading Overlay ── */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            z-index: 100;
            transition: opacity 0.4s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-logo {
            font-size: 2rem;
            animation: logoPulse 2s ease-in-out infinite;
        }

        .loading-text {
            font-size: 0.8125rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 2px solid rgba(0, 212, 255, 0.1);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        /* ── Modal ── */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: all var(--transition);
        }

        .modal-backdrop.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .modal {
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: var(--radius-xl);
            padding: 2rem;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 212, 255, 0.05);
        }

        .modal h3 {
            margin-bottom: 0.75rem;
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
        }

        /* ── Account Modal ── */
        .account-modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: all var(--transition);
        }

        .account-modal-backdrop.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .account-modal {
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 212, 255, 0.12);
            border-radius: var(--radius-xl);
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 212, 255, 0.05);
        }

        .account-modal h3 {
            margin-bottom: 0.5rem;
            font-size: 1.125rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
        }

        .account-modal p {
            color: var(--text-secondary);
            font-size: 0.8125rem;
            margin-bottom: 1rem;
        }

        .account-modal .modal-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-top: 1rem;
        }

        .account-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.125rem 0.625rem;
            border-radius: 4px;
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .account-status-active { background: rgba(0, 255, 136, 0.1); color: var(--neon-green); border: 1px solid rgba(0, 255, 136, 0.2); box-shadow: 0 0 8px rgba(0, 255, 136, 0.08); }
        .account-status-cooldown { background: rgba(255, 140, 0, 0.1); color: var(--neon-orange); border: 1px solid rgba(255, 140, 0, 0.2); }
        .account-status-invalid { background: rgba(255, 51, 102, 0.1); color: var(--neon-red); border: 1px solid rgba(255, 51, 102, 0.2); }
        .account-status-current { background: rgba(0, 212, 255, 0.1); color: var(--neon-blue); border: 1px solid rgba(0, 212, 255, 0.2); box-shadow: 0 0 8px rgba(0, 212, 255, 0.1); }

        .btn-add-account {
            background: var(--neon-green-dim);
            color: var(--neon-green);
            border-color: rgba(0, 255, 136, 0.2);
        }
        .btn-add-account:hover {
            background: rgba(0, 255, 136, 0.2);
            border-color: var(--neon-green);
            box-shadow: 0 0 16px rgba(0, 255, 136, 0.15);
        }

        /* ── Account Chips ── */
        .accounts-inline {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
            margin-top: 0.375rem;
        }

        .account-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.625rem;
            border-radius: var(--radius-sm);
            font-size: 0.625rem;
            font-family: 'JetBrains Mono', monospace;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.02);
            transition: all var(--transition);
            position: relative;
        }

        .account-chip:hover { border-color: rgba(0, 212, 255, 0.2); }

        /* ── Current (active) account — BLUE neon highlight ── */
        .account-chip.current {
            border-color: rgba(0, 212, 255, 0.4);
            background: rgba(0, 212, 255, 0.08);
            color: var(--neon-blue);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.15), inset 0 0 8px rgba(0, 212, 255, 0.05);
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .account-chip.current::before {
            content: '▶';
            font-size: 0.5rem;
            margin-right: 0.25rem;
            color: var(--neon-blue);
            text-shadow: 0 0 6px var(--neon-blue);
            animation: currentPulse 2s ease-in-out infinite;
        }
        @keyframes currentPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ── Ready but not active ── green dot, subtle ── */
        .account-chip.active {
            border-color: rgba(0, 255, 136, 0.15);
            color: var(--text-secondary);
            background: rgba(0, 255, 136, 0.02);
        }

        .account-chip.cooldown {
            border-color: rgba(255, 140, 0, 0.2);
            color: var(--neon-orange);
            background: rgba(255, 140, 0, 0.04);
        }

        .account-chip.invalid {
            border-color: rgba(255, 51, 102, 0.2);
            color: var(--neon-red);
            background: rgba(255, 51, 102, 0.04);
            text-decoration: line-through;
        }

        .account-chip .chip-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .account-chip.active .chip-dot { background: var(--neon-green); box-shadow: 0 0 4px rgba(0, 255, 136, 0.4); }
        .account-chip.cooldown .chip-dot { background: var(--neon-orange); }
        .account-chip.invalid .chip-dot { background: var(--neon-red); }
        .account-chip.current .chip-dot { background: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); animation: dotPulseCurrent 1.5s ease-in-out infinite; }
        @keyframes dotPulseCurrent {
            0%, 100% { box-shadow: 0 0 6px var(--neon-blue), 0 0 12px rgba(0, 212, 255, 0.3); }
            50% { box-shadow: 0 0 10px var(--neon-blue), 0 0 20px rgba(0, 212, 255, 0.5); }
        }
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            header {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
                padding: 1rem 1.25rem;
            }
            .header-left { justify-content: center; }
            .global-actions { justify-content: stretch; }
            .global-actions button { flex: 1; }
            .server-grid { grid-template-columns: 1fr; }
            .tokens-section { grid-template-columns: repeat(2, 1fr); }
            .toast-container { bottom: 1rem; right: 1rem; left: 1rem; }
            .toast { max-width: 100%; }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-effects">
        <div class="bg-grid"></div>
        <div class="particle" style="left:10%;animation-duration:18s;animation-delay:0s"></div>
        <div class="particle" style="left:25%;animation-duration:22s;animation-delay:3s"></div>
        <div class="particle" style="left:40%;animation-duration:16s;animation-delay:6s"></div>
        <div class="particle" style="left:55%;animation-duration:20s;animation-delay:2s"></div>
        <div class="particle" style="left:70%;animation-duration:24s;animation-delay:4s"></div>
        <div class="particle" style="left:85%;animation-duration:19s;animation-delay:1s"></div>
        <div class="particle" style="left:15%;animation-duration:21s;animation-delay:8s;background:var(--neon-green)"></div>
        <div class="particle" style="left:60%;animation-duration:17s;animation-delay:5s;background:var(--neon-purple)"></div>
        <div class="particle" style="left:90%;animation-duration:23s;animation-delay:7s;background:var(--neon-cyan)"></div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-logo">⚡</div>
        <div class="spinner"></div>
        <div class="loading-text">Connecting to servers…</div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="modal-backdrop">
        <div class="modal">
            <h3 id="modalTitle">Confirm Action</h3>
            <p id="modalMessage">Are you sure?</p>
            <div class="modal-actions">
                <button class="btn-primary" onclick="closeModal()">Cancel</button>
                <button id="modalConfirmBtn" class="btn-danger">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Account Add Modal -->
    <div id="addAccountModal" class="account-modal-backdrop">
        <div class="account-modal" style="max-width:480px">
            <h3 id="addAccountTitle">Add Account</h3>
            <p id="addAccountDesc" style="margin-bottom:1rem">Choose how to add a new account.</p>
            <div id="addAccountBody">
                <div style="display:flex;flex-direction:column;gap:0.75rem">
                    <button class="btn-accent" style="width:100%;padding:1rem" id="addAccountBrowserBtn" onclick="addAccountBrowser()">
                        🌐 Through Browser
                        <div style="font-size:0.6875rem;font-weight:400;margin-top:0.25rem;opacity:0.7">Opens browser for login (recommended)</div>
                    </button>
                    <button class="btn-secondary" style="width:100%;padding:1rem" id="addAccountManualBtn" onclick="showManualAccountForm()">
                        ✏️ Manual Input
                        <div style="font-size:0.6875rem;font-weight:400;margin-top:0.25rem;opacity:0.7">Paste token/cookie manually</div>
                    </button>
                </div>
                <!-- Manual form (hidden by default) -->
                <div id="manualAccountForm" style="display:none;margin-top:1rem;text-align:left">
                    <div style="margin-bottom:0.5rem">
                        <label style="font-size:0.6875rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em">Token (required)</label>
                        <textarea id="manualTokenInput" rows="3" style="width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--glass-border);border-radius:8px;padding:0.5rem;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:0.6875rem;resize:vertical" placeholder="eyJhbG..."></textarea>
                    </div>
                    <div style="margin-bottom:0.5rem" id="manualCookieField">
                        <label style="font-size:0.6875rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em">Cookie (DeepSeek only)</label>
                        <textarea id="manualCookieInput" rows="2" style="width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--glass-border);border-radius:8px;padding:0.5rem;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:0.6875rem;resize:vertical" placeholder="aws-waf-token=..."></textarea>
                    </div>
                    <div style="display:flex;gap:0.5rem;margin-top:0.75rem">
                        <button class="btn-primary" style="flex:1" onclick="closeAddAccountModal()">Cancel</button>
                        <button class="btn-accent" style="flex:1" id="manualSubmitBtn" onclick="submitManualAccount()">Add</button>
                    </div>
                </div>
            </div>
            <div id="addAccountStatus" style="display:none;margin-top:0.75rem;font-size:0.75rem;padding:0.5rem;border-radius:8px"></div>
            <div style="margin-top:1rem;text-align:center">
                <button class="btn-secondary btn-sm" onclick="closeAddAccountModal()">Close</button>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="header-left">
                <div class="logo-glow">⚡</div>
                <div>
                    <h1>AI Server Dashboard</h1>
                    <div class="header-subtitle">Multi-Model Orchestration Hub</div>
                </div>
            </div>
            <div class="global-actions">
                <button class="btn-primary" id="btnStartAll" onclick="startAllServers()">▶ Start All</button>
                <button class="btn-danger" id="btnStopAll" onclick="confirmStopAll()">⏹ Stop All</button>
                <button class="btn-secondary" id="btnLog" onclick="window.open('/log', '_blank')" title="Open dashboard logs">📋 Log</button>
            </div>
        </header>

        <div id="serverGrid" class="server-grid">
            <!-- Cards injected by JS -->
        </div>
    </div>

    <script>
        const API_BASE = '';
        let refreshInterval = null;
        let tokenInterval = null;
        let infoInterval = null;
        let logRefreshIntervals = {};
        let pendingAction = null;
        // Track which servers have had logs loaded at least once
        const logsLoadedSet = new Set();
        // Cache for expanded details state
        const detailsExpandedSet = new Set();
        // Track which logs are currently expanded
        const logsExpandedSet = new Set();

        // --- Toast Notifications ---
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            toast.innerHTML = `<span class="toast-icon">${icons[type] || icons.info}</span><span>${escapeHtml(message)}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('toast-out');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // --- Button Loading State ---
        function setButtonLoading(btn, loading) {
            if (!btn) return;
            if (loading) {
                btn.disabled = true;
                btn.dataset.originalText = btn.textContent;
                btn.innerHTML = `<span class="btn-spinner"></span>${btn.textContent.trim()}`;
            } else {
                btn.disabled = false;
                if (btn.dataset.originalText) {
                    btn.textContent = btn.dataset.originalText;
                    delete btn.dataset.originalText;
                }
            }
        }

        // --- Modal Logic ---
        function showModal(title, message, onConfirm) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            pendingAction = onConfirm;
            document.getElementById('confirmModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('confirmModal').classList.remove('active');
            pendingAction = null;
        }

        document.getElementById('modalConfirmBtn').addEventListener('click', () => {
            if (pendingAction) pendingAction();
            closeModal();
        });

        // --- API Calls ---
        async function apiCall(endpoint, method = 'GET') {
            try {
                const res = await fetch(`${API_BASE}${endpoint}`, { method });
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                return await res.json();
            } catch (err) {
                console.error(`API Error [${method} ${endpoint}]:`, err);
                return null;
            }
        }

        async function fetchServers() {
            const data = await apiCall('/api/servers');
            if (data) renderServers(data);
            return data;
        }

        async function fetchLogs(key) {
            const data = await apiCall(`/api/servers/${key}/logs?lines=50`);
            if (!data) return [];
            // Backend returns {stdout: [...], stderr: [...], combined: [...], logs: [...]}
            // Priority: combined > logs > merge stdout+stderr
            if (Array.isArray(data.combined) && data.combined.length > 0) return data.combined;
            if (Array.isArray(data.logs) && data.logs.length > 0) return data.logs;
            // Merge stdout + stderr with type markers
            const lines = [];
            if (Array.isArray(data.stdout)) {
                data.stdout.forEach(l => lines.push({ type: 'stdout', text: l }));
            }
            if (Array.isArray(data.stderr)) {
                data.stderr.forEach(l => lines.push({ type: 'stderr', text: l }));
            }
            return lines;
        }

        async function fetchTokens(key) {
            const data = await apiCall(`/api/servers/${key}/tokens?_=${Date.now()}`);
            return data || null;
        }

        async function fetchServerInfo(key) {
            try {
                const res = await fetch(`${API_BASE}/api/servers/${key}/info`);
                if (!res.ok) {
                    return { status: 'error', error: `HTTP ${res.status}: ${res.statusText}`, models: [] };
                }
                return await res.json();
            } catch (err) {
                console.error(`fetchServerInfo [${key}]:`, err);
                return { status: 'error', error: err.message, models: [] };
            }
        }

        // --- Auth Functions ---
        async function runAuth(key) {
            const btn = document.getElementById('auth-btn-' + key);
            if (!btn) return;
            
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.innerHTML = `<span class="btn-spinner"></span> Auth...`;
            
            try {
                const result = await apiCall(`/api/auth/run/${key}`, 'POST');
                if (result && !result.ok) {
                    showToast(`Auth failed for ${key}: ${result.detail || result.stderr}`, 'error');
                } else {
                    showToast(`Auth completed for ${key}. Result: ${result.stdout.substring(0, 100)}...`, 'success');
                    // Refresh to update account list
                    setTimeout(() => refreshAll(), 2000);
                }
            } catch (err) {
                console.error(`runAuth [${key}]:`, err);
                showToast(`Error during auth for ${key}: ${err.message}`, 'error');
            } finally {
                setButtonLoading(btn, false);
                if (btn.textContent === `<span class="btn-spinner"></span> Auth...`) {
                    btn.textContent = originalText;
                } else {
                    btn.disabled = false;
                }
            }
        }

        async function refreshAccounts(key) {
            const data = await apiCall(`/api/auth/run/${key}`, 'POST');
            return data || null;
        }

        // --- Add Account Modal ---
        let _addAccountServerKey = null;

        function showAddAccountModal(key) {
            _addAccountServerKey = key;
            document.getElementById('addAccountTitle').textContent = `Add Account — ${key}`;
            document.getElementById('addAccountDesc').textContent = `Add a new ${key} account for round-robin rotation.`;
            document.getElementById('manualAccountForm').style.display = 'none';
            document.getElementById('addAccountStatus').style.display = 'none';
            document.getElementById('addAccountBody').style.display = 'block';
            // Show/hide cookie field based on server
            document.getElementById('manualCookieField').style.display = key === 'DEEPSEEK' ? 'block' : 'none';
            document.getElementById('addAccountModal').classList.add('active');
        }

        function closeAddAccountModal() {
            document.getElementById('addAccountModal').classList.remove('active');
            _addAccountServerKey = null;
        }

        function showManualAccountForm() {
            document.getElementById('manualAccountForm').style.display = 'block';
        }

        function showAddAccountStatus(msg, type) {
            const el = document.getElementById('addAccountStatus');
            el.style.display = 'block';
            el.style.background = type === 'error' ? 'rgba(248,81,73,0.15)' : type === 'success' ? 'rgba(63,185,80,0.15)' : 'rgba(88,166,255,0.15)';
            el.style.color = type === 'error' ? 'var(--accent-red)' : type === 'success' ? 'var(--accent-green)' : 'var(--accent-blue)';
            el.textContent = msg;
        }

        async function addAccountBrowser() {
            if (!_addAccountServerKey) return;
            const key = _addAccountServerKey;
            document.getElementById('addAccountBody').style.display = 'none';
            showAddAccountStatus('⏳ Launching browser for login...', 'info');

            try {
                const res = await fetch(`${API_BASE}/api/accounts/${key}/add?mode=browser`, { method: 'POST' });
                const result = await res.json();
                if (result.ok) {
                    showAddAccountStatus(`✅ ${result.detail || 'Auth window opened!'} Complete login in the new terminal window.`, 'success');
                    // Close modal after a delay; the auth script runs in its own window.
                    // User can click "+Add" again to add another account.
                    setTimeout(() => { closeAddAccountModal(); refreshAll(); }, 3000);
                } else {
                    showAddAccountStatus(`❌ Failed: ${result.detail || result.stderr || 'Unknown error'}`, 'error');
                    document.getElementById('addAccountBody').style.display = 'block';
                }
            } catch (err) {
                showAddAccountStatus(`❌ Error: ${err.message}`, 'error');
                document.getElementById('addAccountBody').style.display = 'block';
            }
        }

        async function submitManualAccount() {
            if (!_addAccountServerKey) return;
            const key = _addAccountServerKey;
            const token = document.getElementById('manualTokenInput').value.trim();
            const cookie = document.getElementById('manualCookieInput').value.trim();

            if (!token) {
                showAddAccountStatus('❌ Token is required', 'error');
                return;
            }
            if (key === 'DEEPSEEK' && !cookie) {
                showAddAccountStatus('❌ Cookie is required for DeepSeek', 'error');
                return;
            }

            const btn = document.getElementById('manualSubmitBtn');
            btn.disabled = true;
            btn.textContent = 'Adding...';

            try {
                // For QWEN: write token to session/tokens.json
                // For DEEPSEEK: write token+cookie to deepseek-auth-{n}.json
                // For KIMI: write token to auth.json accounts array
                const body = (key === 'DEEPSEEK')
                    ? { token, cookie }
                    : { token };

                const res = await fetch(`${API_BASE}/api/accounts/${key}/add-manual`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const result = await res.json();
                if (result.ok) {
                    showAddAccountStatus(`✅ Account added successfully!`, 'success');
                    setTimeout(() => { closeAddAccountModal(); refreshAll(); }, 2000);
                } else {
                    showAddAccountStatus(`❌ Failed: ${result.detail || 'Unknown error'}`, 'error');
                }
            } catch (err) {
                showAddAccountStatus(`❌ Error: ${err.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Add';
            }
        }

        async function rotateAccount(key) {
            const btn = document.getElementById(`rotate-btn-${key}`);
            if (btn) { btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span>'; }
            try {
                const res = await fetch(`${API_BASE}/api/accounts/${key}/rotate`, { method: 'POST' });
                const result = await res.json();
                if (result.ok) {
                    const acc = result.current_account || '?';
                    showToast(`${key} → ${acc} activated`, 'success');
                    setTimeout(refreshAll, 500);
                } else {
                    showToast(`Rotate failed: ${result.detail}`, 'error');
                }
            } catch (err) {
                showToast(`Rotate error: ${err.message}`, 'error');
            } finally {
                if (btn) { btn.disabled = false; btn.innerHTML = '🔄'; }
            }
        }

        // --- Actions ---

            setButtonLoading(btn, true);
            try {

                    showToast(`Failed to start ${key.toUpperCase()}`, 'error');
                } else {
                    showToast(`${key.toUpperCase()} starting...`, 'success');
                    setTimeout(() => refreshAll(), 2000);
                }
            } catch (err) {
                showToast(`Error starting ${key.toUpperCase()}: ${err.message}`, 'error');
            } finally {
                setButtonLoading(btn, false);
            }
        }

        async function stopServer(key) {
            const btn = document.querySelector(`[data-action="stop"][data-key="${key}"]`);
            setButtonLoading(btn, true);
            try {
                const result = await apiCall(`/api/servers/${key}/stop`, 'POST');
                if (result === null) {
                    showToast(`Failed to stop ${key.toUpperCase()}`, 'error');
                } else {
                    showToast(`${key.toUpperCase()} stopped`, 'success');

                }
            } catch (err) {
                showToast(`Error stopping ${key.toUpperCase()}: ${err.message}`, 'error');

                setButtonLoading(btn, false);
            }
        }

        async function startAllServers() {

        async function resetServerStats(key) {
            const label = key.toUpperCase();
            showModal(
                `Reset ${label} Statistics`,
                `This will reset all ${label} statistics (requests, tokens, counters). Continue?`,
                async () => {
                    try {
                        const result = await apiCall(`/api/servers/${key}/stats/reset`, 'POST');
                        if (result && result.ok) {
                            showToast(`${label} statistics reset successfully`, 'success');
                            setTimeout(async () => {
                                await refreshAll();
