        // Backward compat
        async function resetRouterStats() {
            return resetServerStats('ROUTER');
        }

        function confirmStopServer(key) {
            showModal(
                `Stop ${key.toUpperCase()}`,
                `Are you sure you want to stop the ${key.toUpperCase()} server?`,
                () => stopServer(key)
            );
        }

        function toggleDetails(key) {
            const section = document.getElementById(`details-${key}`);
            if (!section) return;
            const isExpanded = section.classList.toggle('expanded');
            if (isExpanded) {
                detailsExpandedSet.add(key);
                loadDetailsData(key);
            } else {
                detailsExpandedSet.delete(key);
            }
        }

        function toggleLogs(key) {
            const container = document.getElementById(`logs-wrapper-${key}`);
            if (!container) return;
            const isExpanded = !logsExpandedSet.has(key);
            if (isExpanded) {
                logsExpandedSet.add(key);
                container.style.display = 'block';
                refreshLogs(key);
                if (logRefreshIntervals[key]) clearInterval(logRefreshIntervals[key]);
                logRefreshIntervals[key] = setInterval(() => refreshLogs(key), 5000);
            } else {
                logsExpandedSet.delete(key);
                container.style.display = 'none';
                if (logRefreshIntervals[key]) {
                    clearInterval(logRefreshIntervals[key]);
                    delete logRefreshIntervals[key];
                }
            }
        }

        async function refreshLogs(key) {
            const el = document.getElementById(`logs-${key}`);
            const loader = document.getElementById(`logs-loader-${key}`);
            const updateTimeEl = document.getElementById(`logs-time-${key}`);
            if (!el) return;

            if (loader) loader.classList.remove('hidden');
            try {
                const logs = await fetchLogs(key);
                renderLogsContent(el, logs);
                el.scrollTop = el.scrollHeight;
                logsLoadedSet.add(key);
                if (updateTimeEl) {
                    updateTimeEl.textContent = new Date().toLocaleTimeString();
                }
            } finally {
                if (loader) loader.classList.add('hidden');
            }
        }

        function clearLogs(key) {
            toggleLogs(key);
        }

        // --- Rendering ---
        function getApiStatusClass(status) {
            switch ((status || '').toLowerCase()) {
                case 'ok': return 'api-status-ok';
                case 'timeout': return 'api-status-timeout';
                case 'error': return 'api-status-error';
                default: return 'api-status-offline';
            }
        }

        function formatLogLine(line) {
            if (typeof line === 'object' && line !== null) {
                const text = escapeHtml(line.text || '');
                if (line.type === 'stderr') return `<div class="log-line-stderr">${text}</div>`;
                return `<div class="log-line-stdout">${text}</div>`;
            }
            const str = String(line);
            const lower = str.toLowerCase();
            let cls = 'log-line-stdout';
            if (lower.includes('error') || lower.includes('exception') || lower.includes('traceback')) cls = 'log-line-stderr';
            else if (lower.includes('warn')) cls = 'log-line-warn';
            return `<div class="${cls}">${escapeHtml(str)}</div>`;
        }

        function renderLogsContent(container, logs) {
            if (!logs || logs.length === 0) {
                container.innerHTML = '<div class="log-line-stdout">No logs available</div>';
                return;
            }
            container.innerHTML = logs.map(formatLogLine).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatUptime(seconds) {
            if (!seconds && seconds !== 0) return '—';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}h ${m}m ${s}s`;
            if (m > 0) return `${m}m ${s}s`;
            return `${s}s`;
        }

        function formatTokenCount(n) {
            if (n == null) return '—';
            n = Number(n);
            if (isNaN(n)) return '—';
            if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
            if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
            return String(n);
        }

        function renderServers(servers) {
            const serverMap = {};
            if (Array.isArray(servers)) {
                servers.forEach(s => { serverMap[s.key] = s; });
            } else {
                Object.assign(serverMap, servers);
            }
            const keys = Object.keys(serverMap);
            const grid = document.getElementById('serverGrid');

            if (keys.length >= 3) {
                grid.classList.add('compact');
            } else {
                grid.classList.remove('compact');
            }

            // Preserve logs scroll state before any DOM changes
            const preservedState = {};
            grid.querySelectorAll('.card').forEach(card => {
                const key = card.dataset.key;
                const logsEl = card.querySelector('.logs-viewer');
                preservedState[key] = {
                    scrollTop: logsEl ? logsEl.scrollTop : 0,
                    logsHtml: logsEl ? logsEl.innerHTML : null,
                };
            });

            // Determine which cards need to be created vs updated
            const existingCards = new Set();
            grid.querySelectorAll('.card').forEach(c => existingCards.add(c.dataset.key));
            const newKeys = keys.filter(k => !existingCards.has(k));

            // Full rebuild only for new cards (first render or newly added server)
            if (newKeys.length > 0 || existingCards.size === 0) {
                // Full rebuild
                grid.innerHTML = keys.map(key => {
                    const s = serverMap[key];
                    const isRunning = s.status === 'running';
                    const statusClass = isRunning ? 'status-running' : 'status-stopped';
                    const statusLabel = isRunning ? '● Running' : '○ Stopped';
                    const apiStatus = s.api_status || 'offline';
                    const apiClass = getApiStatusClass(apiStatus);
                    const uptime = isRunning ? formatUptime(s.uptime) : '—';
                    const isDetailsExpanded = detailsExpandedSet.has(key);
                    const isLogsExpanded = logsExpandedSet.has(key);
                    const cardClass = isRunning ? 'card card-running' : 'card card-stopped';
                    const iconClass = key === 'ROUTER' ? 'icon-router' : key === 'QWEN' ? 'icon-qwen' : key === 'DEEPSEEK' ? 'icon-deepseek' : 'icon-kimi';
                    const iconEmoji = key === 'ROUTER' ? '🧭' : key === 'QWEN' ? '🐉' : key === 'DEEPSEEK' ? '🔮' : '🌙';

                    return `
                    <div class="${cardClass}" data-key="${key}">
                        <div class="card-header">
                            <div class="server-name">
                                <span class="server-icon ${iconClass}">${iconEmoji}</span>
                                <span>${escapeHtml(s.name || key)}</span>
                            </div>
                            <span class="status-badge ${statusClass}">
                                <span class="status-dot"></span>
                                ${statusLabel}
                            </span>
                        </div>
                        <div class="card-info">
                            <div class="info-item">
                                <span class="info-label">PID</span>
                                <span class="info-value">${s.pid ?? '—'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Port</span>
                                <span class="info-value">${s.port ?? '—'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">API Status</span>
                                <span class="info-value ${apiClass}">${escapeHtml(apiStatus)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Uptime</span>
                                <span class="info-value">${uptime}</span>
                            </div>
                        </div>
                        <div class="active-models-section" id="am-section-${key}" style="display:none">
                            <div class="active-models-label">Active Model(s)</div>
                            <div class="active-models-list" id="am-list-${key}"></div>
                        </div>
                        ${['QWEN','DEEPSEEK','KIMI'].includes(key) ? `
                        <div class="accounts-inline" id="accounts-inline-${key}">
                            <span style="font-size:0.625rem;color:var(--text-secondary);margin-right:0.25rem">Accounts:</span>
                            <span style="font-size:0.625rem;color:var(--text-secondary);opacity:0.5">loading...</span>
                        </div>` : ''}
                        <div class="tokens-section" id="tokens-${key}">
                            <div class="token-item">
                                <span class="token-label">⬆ Input</span>
                                <span class="token-value token-input" id="tok-in-${key}">—</span>
                            </div>
                            <div class="token-item">
                                <span class="token-label">⬇ Output</span>
                                <span class="token-value token-output" id="tok-out-${key}">—</span>
                            </div>
                            <div class="token-item">
                                <span class="token-label">Σ Total</span>
                                <span class="token-value token-total" id="tok-total-${key}">—</span>
                            </div>
                            <div class="token-item">
                                <span class="token-label">Requests</span>
                                <span class="token-value token-requests" id="tok-req-${key}">—</span>
                            </div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-primary btn-sm" data-action="start" data-key="${key}" ${isRunning ? 'disabled' : ''} onclick="startServer('${key}')">▶ Start</button>
                            <button class="btn-danger btn-sm" data-action="stop" data-key="${key}" ${!isRunning ? 'disabled' : ''} onclick="confirmStopServer('${key}')">⏹ Stop</button>
                            <button class="btn-secondary btn-sm" onclick="toggleDetails('${key}')">${isDetailsExpanded ? '▲ Hide Details' : 'ℹ Details'}</button>
                            <button class="btn-secondary btn-sm" onclick="toggleLogs('${key}')">${isLogsExpanded ? '▲ Hide Logs' : '📋 Logs'}</button>
                            ${['QWEN','DEEPSEEK','KIMI'].includes(key) ? '<button class="btn-accent btn-sm" id="auth-btn-'+key+'" title="Add new account" onclick="showAddAccountModal(\''+key+'\')">＋ Add</button><button class="btn-secondary btn-sm" id="rotate-btn-'+key+'" title="Rotate to next account" onclick="rotateAccount(\''+key+'\')">🔄</button>' : ''}
                            ${key === 'ROUTER' ? '<button class="btn-accent btn-sm" onclick="window.open(\'/3270\', \'_blank\')" title="Open router detail page">📊 Router Details</button>' : ''}
                            <button class="btn-danger btn-sm" onclick="resetServerStats('${key}')" title="Reset ${key} statistics">🔄 Reset Stats</button>
                        </div>
                        <div class="details-section ${isDetailsExpanded ? 'expanded' : ''}" id="details-${key}">
                            <div class="details-header">Models & Accounts</div>
                            <div id="details-content-${key}" style="color:var(--text-secondary);font-size:0.75rem;">Click to load...</div>
                        </div>
                        <div class="logs-container">
                            <div id="logs-wrapper-${key}" style="display:${isLogsExpanded ? 'block' : 'none'}">
                                <div class="logs-header">
                                    <span>Recent Logs</span>
                                    <div class="logs-actions">
                                        <span class="logs-last-update" id="logs-time-${key}"></span>
                                        <button class="btn-secondary btn-sm" onclick="refreshLogs('${key}')" title="Refresh logs">↻</button>
                                        <button class="btn-secondary btn-sm" onclick="clearLogs('${key}')" title="Hide logs">✕</button>
                                    </div>
                                </div>
                                <div class="logs-viewer" data-key="${key}" id="logs-${key}">
                                    <div class="logs-loading hidden" id="logs-loader-${key}"><div class="mini-spinner"></div></div>
                                    Loading...
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                }).join('');
            } else {
                // Update existing cards in place — no flicker
                for (const key of keys) {
                    const s = serverMap[key];
                    const card = grid.querySelector(`.card[data-key="${key}"]`);
                    if (!card) continue;

                    const isRunning = s.status === 'running';
                    const statusClass = isRunning ? 'status-running' : 'status-stopped';
                    const statusLabel = isRunning ? 'Running' : 'Stopped';
                    const apiStatus = s.api_status || 'offline';
                    const apiClass = getApiStatusClass(apiStatus);
                    const uptime = isRunning ? formatUptime(s.uptime) : '—';

                    // Status badge
                    const badge = card.querySelector('.status-badge');
                    if (badge) {
                        badge.className = `status-badge ${statusClass}`;
                        badge.innerHTML = `<span class="status-dot"></span>${statusLabel}`;
                    }

                    // Info values
                    const infoItems = card.querySelectorAll('.info-value');
                    if (infoItems[0]) infoItems[0].textContent = s.pid ?? '—';
                    if (infoItems[1]) infoItems[1].textContent = s.port ?? '—';
                    if (infoItems[2]) {
                        infoItems[2].className = `info-value ${apiClass}`;
                        infoItems[2].textContent = apiStatus;
                    }
                    if (infoItems[3]) infoItems[3].textContent = uptime;

                    // Active models section
                    const amSection = card.querySelector(`#am-section-${key}`);
                    const amList = card.querySelector(`#am-list-${key}`);
                    if (amSection && amList) {
                        if (Array.isArray(s.active_models) && s.active_models.length > 0) {
                            amList.innerHTML = s.active_models.map(am =>
                                `<div class="active-model-item">
                                    <span class="active-model-vm">${escapeHtml(am.virtual_model)}</span>
                                    <span class="active-model-arrow">→</span>
                                    <span class="active-model-name">${escapeHtml(am.selected_model)}</span>
                                </div>`
                            ).join('');
                            amSection.style.display = '';
                        } else {
                            amSection.style.display = 'none';
                        }
                    }

                    // Start/Stop buttons
                    const startBtn = card.querySelector('[data-action="start"]');
                    const stopBtn = card.querySelector('[data-action="stop"]');
                    if (startBtn) startBtn.disabled = isRunning;
                    if (stopBtn) stopBtn.disabled = !isRunning;
                }
            }

            // Restore logs and load tokens
            keys.forEach(key => {
                const state = preservedState[key];
                const logsEl = document.getElementById(`logs-${key}`);
                const loader = document.getElementById(`logs-loader-${key}`);

                if (state && state.tokensHtml) {
                    const tokSection = document.getElementById(`tokens-${key}`);
                    if (tokSection) tokSection.innerHTML = state.tokensHtml;
                } else {
                    loadTokens(key);
                }

                if (logsExpandedSet.has(key) && logsEl && !logsLoadedSet.has(key)) {
                    if (loader) loader.classList.remove('hidden');
                    fetchLogs(key).then(logs => {
                        renderLogsContent(logsEl, logs);
                        logsEl.scrollTop = logsEl.scrollHeight;
                        logsLoadedSet.add(key);
                        const timeEl = document.getElementById(`logs-time-${key}`);
                        if (timeEl) timeEl.textContent = new Date().toLocaleTimeString();
                    }).finally(() => {
                        if (loader) loader.classList.add('hidden');
                    });
                } else if (logsEl && state && state.logsHtml) {
                    logsEl.innerHTML = state.logsHtml;
                    if (!logsEl.querySelector('.logs-loading')) {
                        const ld = document.createElement('div');
                        ld.className = 'logs-loading hidden';
                        ld.id = `logs-loader-${key}`;
                        ld.innerHTML = '<div class="mini-spinner"></div>';
                        logsEl.prepend(ld);
                    }
                    logsEl.scrollTop = state.scrollTop || 0;
                }

                if (detailsExpandedSet.has(key)) {
                    loadDetailsData(key);
                }
            });
        }

        async function loadTokens(key) {
            const tokens = await fetchTokens(key);
            const section = document.getElementById(`tokens-${key}`);
            if (!section) return;

            const tracking = (tokens && (tokens.tracking || tokens.tracking_mode)) || 'live';
            const requests = tokens ? (tokens.requests_count ?? tokens.requests ?? tokens.request_count ?? 0) : 0;

            const badgeColors = { live: '#3fb950', requests_only: '#d29922', partial: '#d29922', 'not tracked': '#8b949e' };
            const badgeColor = badgeColors[tracking] || '#8b949e';
            const badgeHtml = `<span style="display:inline-block;padding:0.125rem 0.375rem;border-radius:4px;font-size:0.5625rem;font-weight:600;background:${badgeColor}22;color:${badgeColor};border:1px solid ${badgeColor}44;margin-bottom:0.25rem">${escapeHtml(tracking)}</span>`;

            if (!tokens || tracking === 'not tracked') {
                const note = tokens && tokens.note ? escapeHtml(tokens.note) : 'Token tracking not available';
                section.innerHTML = `
                    <div class="token-item" style="grid-column:1/-1">
                        ${badgeHtml}
                        <span class="token-label">⚠ Not Tracked</span>
                        <span class="token-value" style="font-size:0.6875rem;color:var(--text-secondary)">${note}</span>
                        ${requests > 0 ? `<span class="token-value token-requests" style="margin-top:0.25rem">📊 ${formatTokenCount(requests)} requests</span>` : ''}
                    </div>`;
                return;
            }

            if (tracking === 'requests_only') {
                section.innerHTML = `
                    <div class="token-item" style="grid-column:1/-1">
                        ${badgeHtml}
                        <span class="token-label">Requests Only</span>
                        <span class="token-value token-requests">📊 ${formatTokenCount(requests)} requests</span>
                    </div>`;
                return;
            }

            const inputVal = tokens.input_tokens ?? tokens.input ?? 0;
            const outputVal = tokens.output_tokens ?? tokens.output ?? 0;
            const totalVal = tokens.total_tokens ?? tokens.total ?? (inputVal + outputVal);

            let html = `
                <div class="token-item">
                    <span class="token-label">⬆ Input</span>
                    <span class="token-value token-input">${formatTokenCount(inputVal)}</span>
                </div>
                <div class="token-item">
                    <span class="token-label">⬇ Output</span>
                    <span class="token-value token-output">${formatTokenCount(outputVal)}</span>
                </div>
                <div class="token-item">
                    <span class="token-label">Σ Total</span>
                    <span class="token-value token-total">${formatTokenCount(totalVal)}</span>
                </div>
                <div class="token-item">
                    <span class="token-label">Requests</span>
                    <span class="token-value token-requests">${formatTokenCount(requests)}</span>
                </div>`;

            // ROUTER by_model breakdown from details
            const upperKey = key.toUpperCase();
            const details = tokens.details || {};
            const byModel = details.by_model || tokens.by_model || tokens.models_breakdown || null;
            if ((upperKey === 'ROUTER' || (tokens.type === 'router')) && byModel && typeof byModel === 'object') {
                const entries = Object.entries(byModel);
                if (entries.length > 0) {
                    html += `<div style="grid-column:1/-1;margin-top:0.5rem;padding-top:0.5rem;border-top:1px solid var(--glass-border)">`;
                    html += `<div style="font-size:0.5625rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-secondary);margin-bottom:0.375rem">By Model</div>`;
                    entries.forEach(([modelName, mData]) => {
                        const mIn = mData.input_tokens ?? mData.input ?? 0;
                        const mOut = mData.output_tokens ?? mData.output ?? 0;
                        const mReq = mData.requests ?? mData.request_count ?? 0;
                        html += `<div style="display:flex;justify-content:space-between;align-items:center;font-size:0.625rem;padding:0.125rem 0;font-family:'JetBrains Mono',monospace">`;
                        html += `<span style="color:var(--text-primary)">${escapeHtml(modelName)}</span>`;
                        html += `<span style="color:var(--text-secondary)">${formatTokenCount(mIn)}↑ ${formatTokenCount(mOut)}↓ ${formatTokenCount(mReq)}req</span>`;
                        html += `</div>`;
                    });
                    html += `</div>`;
                }
            }

            // Note from details
            const note = details.note || tokens.note;
            if (note) {
                html += `<div style="grid-column:1/-1;margin-top:0.375rem;font-size:0.5625rem;color:var(--text-secondary);font-style:italic">${escapeHtml(note)}</div>`;
            }

            section.innerHTML = `<div style="grid-column:1/-1;text-align:right">${badgeHtml}</div>` + html;
        }

        async function loadAllTokens() {
            const grid = document.getElementById('serverGrid');
            if (!grid) return;
            grid.querySelectorAll('.card').forEach(card => {
                const key = card.dataset.key;
                if (key) loadTokens(key);
            });
        }

        async function loadAllInfo() {
            const grid = document.getElementById('serverGrid');
            if (!grid) return;
            grid.querySelectorAll('.card').forEach(card => {
                const key = card.dataset.key;
                if (key && detailsExpandedSet.has(key)) loadDetailsData(key);
            });
            // Also update inline account chips
            updateInlineAccounts();
        }

        async function updateInlineAccounts() {
            for (const key of ['QWEN', 'DEEPSEEK', 'KIMI']) {
                const container = document.getElementById(`accounts-inline-${key}`);
                if (!container) continue;
                try {
                    const data = await apiCall(`/api/accounts/${key}`);
                    if (!data || !data.accounts) {
                        container.innerHTML = '<span style="font-size:0.625rem;color:var(--text-secondary);opacity:0.5">No accounts</span>';
                        continue;
                    }
                    const accounts = data.accounts;
                    if (accounts.length === 0) {
                        container.innerHTML = '<span style="font-size:0.625rem;color:var(--text-secondary);opacity:0.5">No accounts</span>';
                        continue;
                    }
                    let html = `<span style="font-size:0.625rem;color:var(--text-secondary);margin-right:0.25rem">Accounts:</span>`;
                    accounts.forEach((acc, idx) => {
                        const isCurrent = acc.is_current;
                        const status = acc.status || 'unknown';
                        const chipClass = isCurrent ? 'current' : status;
                        const dotColor = status === 'active' ? 'var(--accent-green)' : status === 'cooldown' ? '#d29922' : status === 'invalid' ? 'var(--accent-red)' : 'var(--text-secondary)';
                        // Show account number (1-based) instead of long ID
                        const label = `#${idx + 1}`;
                        const tooltipLines = [
                            `Account #${idx + 1}`,
                            `ID: ${acc.id}`,
                            `Status: ${status}${isCurrent ? ' — CURRENT (active)' : ''}`,
                            acc.has_token !== undefined ? `Token: ${acc.has_token ? 'yes' : 'no'}` : '',
                            acc.has_cookie !== undefined ? `Cookie: ${acc.has_cookie ? 'yes' : 'no'}` : '',
                            acc.file ? `File: ${acc.file}` : '',
                            acc.token_preview ? `Key: ${acc.token_preview}` : '',
                            acc.reset_at ? `Reset: ${acc.reset_at}` : '',
                        ].filter(Boolean).join(' | ');
                        html += `<span class="account-chip ${chipClass}" title="${escapeHtml(tooltipLines)}"><span class="chip-dot" style="background:${dotColor}"></span>${escapeHtml(label)}</span>`;
                    });
                    container.innerHTML = html;
                } catch (e) {
                    container.innerHTML = '<span style="font-size:0.625rem;color:var(--accent-red)">Error loading accounts</span>';
                }
            }
        }

        async function loadDetailsData(key) {
            const container = document.getElementById(`details-content-${key}`);
            if (!container) return;
            container.innerHTML = '<span style="opacity:0.5">Loading...</span>';

            const info = await fetchServerInfo(key);
            if (!info) {
                container.innerHTML = '<span style="opacity:0.5">No info available</span>';
                return;
            }

            let html = '';
            const upperKey = key.toUpperCase();

            if (info.status === 'error') {
                html += `<div style="color:var(--accent-red);font-size:0.75rem;margin-bottom:0.5rem">⚠ ${escapeHtml(info.error || 'Unknown error')}</div>`;
            }

            if (info.status === 'offline') {
                html += '<div style="color:var(--text-secondary);font-size:0.75rem">Server offline</div>';
                container.innerHTML = html;
                return;
            }

            // ROUTER-specific rendering
            if (upperKey === 'ROUTER' || info.type === 'router') {
                const virtualModels = info.virtual_models || {};
                const vmEntries = Array.isArray(virtualModels)
                    ? virtualModels.map(vm => [typeof vm === 'string' ? vm : (vm.name || vm.id || 'unknown'), vm])
                    : Object.entries(virtualModels);

                if (vmEntries.length > 0) {
                    vmEntries.forEach(([vmName, vmData]) => {
                        const name = typeof vmName === 'string' ? vmName : String(vmName);
                        let fallbacks = [];
                        if (vmData && typeof vmData === 'object') {
                            fallbacks = Array.isArray(vmData.fallbacks) ? vmData.fallbacks
                                : Array.isArray(vmData.providers) ? vmData.providers
                                : Array.isArray(vmData.attempts) ? vmData.attempts
                                : [];
                        }
                        html += `<div class="router-model-card">`;
                        html += `<div class="router-model-name">${escapeHtml(name)}</div>`;
                        if (fallbacks.length > 0) {
                            html += `<div class="fallback-chain">`;
                            fallbacks.forEach((fb, idx) => {
                                const provider = typeof fb === 'string' ? fb : (fb.provider || fb.name || 'unknown');
                                const model = typeof fb === 'object' ? (fb.model || '') : '';
                                html += `<div class="fallback-item">
                                    <span class="fallback-priority">#${idx + 1}</span>
                                    <span class="fallback-provider">${escapeHtml(provider)}</span>
                                    ${model ? `<span class="fallback-model">${escapeHtml(model)}</span>` : ''}
                                </div>`;
                            });
                            html += `</div>`;
                        }
                        html += `</div>`;
                    });
                }

                const selectedModel = info.selectedModel || info.selected_model
                    || (info.router_config && info.router_config.selectedModel)
                    || (info.router_config && info.router_config.selected_model);
                if (selectedModel) {
                    html += `<div style="margin-top:0.5rem;font-size:0.75rem;"><span style="color:var(--text-secondary)">Selected:</span> <strong>${escapeHtml(selectedModel)}</strong></div>`;
                }

                const configObj = info.router_config || info.config;
                if (configObj) {
                    html += '<div style="margin-top:0.5rem;font-size:0.6875rem;color:var(--text-secondary)">Config:</div>';
                    html += `<pre style="margin-top:0.25rem;padding:0.5rem;background:rgba(0,0,0,0.3);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:0.625rem;overflow-x:auto;color:var(--text-secondary);max-height:200px;overflow-y:auto">${escapeHtml(JSON.stringify(configObj, null, 2))}</pre>`;
                }
            } else {
                // QWEN/DEEPSEEK rendering
                const models = info.models || [];
                if (models.length > 0) {
                    html += `<div style="font-size:0.6875rem;color:var(--text-secondary);margin-bottom:0.25rem">${models.length} model(s)</div>`;
                    html += '<div class="model-list">';
                    models.forEach(m => {
                        const name = typeof m === 'string' ? m : (m.id || m.name || 'unknown');
                        const ownedBy = typeof m === 'object' ? (m.owned_by || '') : '';
                        const caps = typeof m === 'object' && Array.isArray(m.capabilities) ? m.capabilities.join(', ') : '';
                        const realModel = typeof m === 'object' ? (m.real_model || '') : '';
                        html += `<div class="model-item">
                            <div class="model-name">${escapeHtml(name)}</div>
                            <div class="model-meta">
                                ${ownedBy ? `<span class="model-tag">${escapeHtml(ownedBy)}</span>` : ''}
                                ${caps ? `<span>${escapeHtml(caps)}</span>` : ''}
                            </div>
                            ${realModel ? `<div style="font-size:0.625rem;color:var(--text-secondary);margin-top:0.125rem">Real: ${escapeHtml(realModel)}</div>` : ''}
                        </div>`;
                    });
                    html += '</div>';
                }

                const accounts = info.accounts || [];
                if (accounts.length > 0) {
                    html += `<div style="margin-top:0.5rem;font-size:0.6875rem;color:var(--text-secondary)">${accounts.length} account(s) — round-robin rotation:</div>`;
                    html += '<div class="account-list" style="margin-top:0.25rem">';
                    accounts.forEach(acc => {
                        const label = acc.id || acc.token_preview || 'unknown';
                        const isCurrent = acc.is_current;
                        const statusIcon = acc.status === 'active' ? '🟢' : acc.status === 'cooldown' ? '🟡' : acc.status === 'invalid' ? '🔴' : '⚪';
                        const bgColor = isCurrent ? 'rgba(88,166,255,0.15)' : 'rgba(63,185,80,0.1)';
                        const borderColor = isCurrent ? 'rgba(88,166,255,0.4)' : 'rgba(63,185,80,0.2)';
                        const textColor = isCurrent ? 'var(--accent-blue)' : 'var(--accent-green)';
                        const currentLabel = isCurrent ? ' ← current' : '';
                        const cookieIcon = acc.has_cookie ? ' 🍪' : '';
                        html += `<span class="account-badge" style="background:${bgColor};border-color:${borderColor};color:${textColor}">${statusIcon} ${escapeHtml(label)}${cookieIcon}${currentLabel}</span>`;
                    });
                    html += '</div>';
                }

                // DeepSeek extra info
                if (info.deepseek_extra) {
                    html += '<div style="margin-top:0.5rem;font-size:0.6875rem;color:var(--text-secondary)">Extra:</div>';
                    html += `<pre style="margin-top:0.25rem;padding:0.5rem;background:rgba(0,0,0,0.3);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:0.625rem;overflow-x:auto;color:var(--text-secondary);max-height:150px;overflow-y:auto">${escapeHtml(JSON.stringify(info.deepseek_extra, null, 2))}</pre>`;
                }
            }

            if (!html) {
                html = '<span style="opacity:0.5">No models or accounts info</span>';
            }

            container.innerHTML = html;
        }

        // --- Account Management ---
        // Account modal and rotation handlers are defined above near the Add Account Modal block.

        // --- Init ---
        async function init() {
            await fetchServers();
            document.getElementById('loadingOverlay').classList.add('hidden');
            // Auto-refresh every 5 seconds
            refreshInterval = setInterval(fetchServers, 5000);
            // Token refresh every 5 seconds
            tokenInterval = setInterval(loadAllTokens, 5000);
            // Info refresh every 15 seconds
            infoInterval = setInterval(loadAllInfo, 15000);
        }

        async function refreshAll() {
            await fetchServers();
            loadAllTokens();
            updateInlineAccounts();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
